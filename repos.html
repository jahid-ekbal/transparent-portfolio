<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jahid Ekbal Mallick - GitHub Repositories | Full-Stack Developer Portfolio">
    <meta name="keywords" content="Jahid Ekbal Mallick, GitHub, Repositories, Projects, Full-Stack Developer">
    <meta property="og:title" content="Jahid Ekbal Mallick - GitHub Repositories">
    <meta property="og:description" content="Explore all my GitHub repositories and projects">
    <meta name="theme-color" content="#020812">
    <title>Jahid Ekbal Mallick - Repositories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="nav-logo">
                </> JAHID
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">← Back Home</a>
            </div>
            <div class="nav-right">
                <div class="github-stats">
                    <a href="https://github.com/jahid-ekbal" target="_blank" class="github-link">
                        <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        <span class="follower-count" id="follower-count">10</span>
                    </a>
                </div>
                <div class="theme-toggle">
                    <button id="theme-switch" class="theme-switch-button" aria-label="Toggle theme">
                        <i data-lucide="moon" stroke-width="2.5"></i>
                    </button>
                </div>
            </div>
            <div class="hamburger"
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main>
        <section class="repos-hero">
            <div class="container">
                <h1>// GITHUB REPOSITORIES</h1>
                <p class="repos-subtitle">Explore all my projects and contributions on GitHub</p>
                <div class="repos-stats glass">
                    <div class="stat-item">
                        <span class="stat-number" id="repo-count">33</span>
                        <span class="stat-label">Repositories</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="follower-count-hero">10</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="stars-count">0</span>
                        <span class="stat-label">Total Stars</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="repos-section">
            <div class="container">
                <div class="repos-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="typescript">TypeScript</button>
                    <button class="filter-btn" data-filter="javascript">JavaScript</button>
                    <button class="filter-btn" data-filter="html">HTML/CSS</button>
                    <button class="filter-btn" data-filter="other">Other</button>
                </div>

                <div class="repos-grid" id="repos-grid">
                    <!-- Repositories will be loaded dynamically -->
                </div>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading repositories...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Telegram-like Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="bottom-nav-container">
            <a href="index.html" class="bottom-nav-item" aria-label="Home">
                <i data-lucide="home" class="bottom-nav-icon"></i>
                <span class="bottom-nav-label">Home</span>
            </a>
            <a href="repos.html" class="bottom-nav-item active" aria-label="Repos">
                <i data-lucide="archive" class="bottom-nav-icon"></i>
                <span class="bottom-nav-label">Repos</span>
            </a>
            <a href="https://github.com/jahid-ekbal" target="_blank" class="bottom-nav-item" aria-label="GitHub">
                <i data-lucide="github" class="bottom-nav-icon"></i>
                <span class="bottom-nav-label">GitHub</span>
            </a>
            <a href="mailto:jahidekbalmallick@gmail.com" class="bottom-nav-item" aria-label="Contact">
                <i data-lucide="mail" class="bottom-nav-icon"></i>
                <span class="bottom-nav-label">Contact</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <script src="script.js"></script>
    <script src="repos.js"></script>
</body>
</html>
