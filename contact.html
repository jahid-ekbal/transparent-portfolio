  <main>
    <section id="contact" class="contact">
      <div class="container">
        <h2>// GET IN TOUCH</h2>
        <div class="contact-content">
          <div class="contact-info glass">
            <div class="email-block"><h3>Personal</h3><p class="email" data-email="jahidekbalmallick@gmail.com">jahidekbalmallick@gmail.com</p></div>
            <div class="email-block"><h3>Business</h3><p class="email" data-email="jahidekbal.io@gmail.com">jahidekbal.io@gmail.com</p></div>
            <div class="social-links">
              <a href="https://github.com/jahid-ekbal" target="_blank" title="GitHub"><i data-lucide="github"></i></a>
              <a href="https://linkedin.com/in/jahid-developer" target="_blank" title="LinkedIn"><i data-lucide="linkedin"></i></a>
              <a href="https://twitter.com/jahidekbal01" target="_blank" title="Twitter"><i data-lucide="twitter"></i></a>
              <a href="https://www.youtube.com/@teamregix" target="_blank" title="YouTube"><i data-lucide="youtube"></i></a>
              <a href="https://discord.gg/f8dcB5nDyh" target="_blank" title="Discord"><i data-lucide="message-circle"></i></a>
              <a href="https://instagram.com/jahid.developer" target="_blank" title="Instagram"><i data-lucide="instagram"></i></a>
            </div>
          </div>
          <form class="contact-form glass" id="contactForm">
            <div class="form-group"><input type="text" id="name" name="name" placeholder="Your Name" autocomplete="name" required></div>
            <div class="form-group"><input type="email" id="email" name="email" placeholder="Your Email" autocomplete="email" required></div>
            <div class="form-group"><textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea></div>
            <button type="submit" class="btn btn-solid">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>
